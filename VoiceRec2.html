<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Speech API Example 2</title>
    <style>
        body { font-family: sans-serif; padding: 20px; zoom:250%; }
        textarea { width: 60%; height: 50px; font-size:25px; padding-top:10px; padding-bottom:10px; 
			display:block; margin-left:auto; margin-right:auto; }
        button { padding: 10px; cursor: pointer; font-size:30px; }
    </style>
	<script>		
		// Use standard or vendor-prefixed speech recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
		const recognition = new SpeechRecognition(); 
		
		function ScoreInput() {
		  alert("In 'ScoreInput()'!\n"+
		  		"\tEnter '6' or '2'.");
		  if (SpeechRecognition) {        
			//const recognition = new SpeechRecognition(); 
				recognition.start();
            //const toggleButton = document.getElementById("toggle-recording");
            const output = document.getElementById("transcription-result");
            let isRecording = false;

            // Configure settings
            recognition.continuous = true;	//false;	//true;    //false = stop after single 'utterance'
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            // Handle results
            recognition.onresult = (event) => {
                let text = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    text += event.results[i][0].transcript;
                }
                output.value = text;	
				
					document.getElementById("transcription-result").focus();
					if (text=='Six' || text=="6" || text=="sex" || text=="Sex") { 
						document.getElementById("VRp2h3").value=6; 
					}
					else if ( text=='Two' || text=="To" || text=='2' ) {  
						document.getElementById("VRp2h3").value=2; 
						//recognition.stop();
						//toggleButton.textContent = "Start Listening";
					}
					else { alert("Input NOT = 6 or 2!"); document.getElementById("VRp2h3").value=null;}					
					output.value = text;					
					alert("text = '"+text+"'");	
			}
		  }				
		}
		
		function CLICKvr(inputID) {
		  alert("In 'CLICKvr(inputID)'!\n"+
		  		"\tEnter '03' or '04'.");
		  if (SpeechRecognition) {        
			//const recognition = new SpeechRecognition(); 
				recognition.start();
            //const toggleButton = document.getElementById("toggle-recording");
            const output = document.getElementById("transcription-result");
            let isRecording = false;

            // Configure settings
            recognition.continuous = true;	//false;	//true;    //false = stop after single 'utterance'
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            // Handle results
            recognition.onresult = (event) => {
                let text = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    text += event.results[i][0].transcript;
                }
                output.value = text;	
				
					document.getElementById("transcription-result").focus();
					if (text=='03') { 
						document.getElementById(inputID).value=3; 
					}
					else if (text=='04') {  
						document.getElementById(inputID).value=4; 
					}
					else { alert("Input NOT = 6 or 2!"); document.getElementById(inputID).value=null;}					
					output.value = text;					
					alert("text = '"+text+"'");	
			}
		  }				
	  }
	 
	  var thisFOCUS; 
	  function FOCUSvr(inputID) {
		  thisFOCUS = inputID;
		  alert("In 'FOCUSvr(inputID)'!\n"+
		  		 "inputID = '"+inputID+"'\n"+
				 "thisFOCUS = '"+thisFOCUS+"'");	//VRp1h3
	  }
	  
	</script>
</head>
<body onload="">
