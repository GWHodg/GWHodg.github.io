<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Speech API Example</title>
    <style>
        body { font-family: sans-serif; padding: 20px; zoom:250%; }
        textarea { width: 80%; height: 150px; font-size:25px; padding-top:10px; padding-bottom:10px; 
			display:block; margin-left:auto; margin-right:auto; }
        button { padding: 10px; cursor: pointer; font-size:30px; }
    </style>
</head>
<body>
    <button id="toggle-recording">Start Listening</button>
    <textarea id="transcription-result" placeholder="Speak..."></textarea>
	<br><hr><br>
	<input id="inputTEST" maxlength=5 placeholder="input test" style="font-size:25px;">
		<span id='SPNtest' style="border:1px solid white; border-radius:0px; padding:2px; font-weight:bold;">span</span>

    <script>
        // Use standard or vendor-prefixed speech recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            const recognition = new SpeechRecognition(); //
            const toggleButton = document.getElementById("toggle-recording");
            const output = document.getElementById("transcription-result");
					const output2 = document.getElementById("inputTEST");
            let isRecording = false;

            // Configure settings
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            // Handle results
            recognition.onresult = (event) => {
                let text = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    text += event.results[i][0].transcript;
                }
                output.value = text;	output2.value = text;	
            };

            // Start/Stop logic
            toggleButton.addEventListener("click", () => {
                if (isRecording) {
                    recognition.stop();
                    toggleButton.textContent = "Start Listening";
                } else {
                    recognition.start();
                    toggleButton.textContent = "Stop Listening";
                }
                isRecording = !isRecording;
            });
        } else {
            alert("Web Speech API not supported.");
        }
    </script>
</body>
</html>
